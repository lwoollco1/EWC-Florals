kind = "web"
previewPath = "/"
title = "EWC Florals"
version = "1.0.0"
id = "artifacts/ewc-florals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22057

[services.development]
run = "pnpm --filter @workspace/ewc-florals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ewc-florals", "run", "build" ]
publicDir = "artifacts/ewc-florals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22057"
BASE_PATH = "/"
